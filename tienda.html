<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda | StoreQuil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Ajustes rápidos para que los filtros y grilla se vean bien */
    .filters { display: flex; gap: 15px; margin: 20px 0; align-items: center; flex-wrap: wrap; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    .hidden { display: none; }
    .offer-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; position: absolute; top: 10px; left: 10px; }
    .product-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; position: relative; }
    .product-image img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
  </style>
</head>
<body>

  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <img src="https://i.pinimg.com/736x/d5/f2/1c/d5f21cb479b6d9823b26dd65dfed628e.jpg" alt="Logo" class="logo-img">
        <span class="logo-text">Store<span>Quil</span></span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Inicio</a>
        <a href="tienda.html">Tienda</a>
      </nav>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main class="container" style="padding-top: 100px;">
    <header>
      <h1>Todos los productos</h1>
      <p>Lo más nuevo de nuestros emprendedores.</p>
    </header>

    <section class="filters">
      <select id="filterCategory">
        <option value="Todas">Todas</option>
        <option value="Comida">Comida</option>
        <option value="Ropa">Ropa</option>
        <option value="Belleza">Belleza</option>
        <option value="Tecnología">Tecnología</option>
        <option value="Hogar">Hogar</option>
        <option value="Mascotas">Mascotas</option>
        <option value="Regalos">Regalos</option>
        <option value="Servicios">Servicios</option>
        <option value="Educación">Educación</option>
        <option value="Automotriz">Automotriz</option>
        <option value="Videojuegos">Videojuegos</option>
        <option value="Otros">Otros</option>
      </select>
      
      <select id="sortPrice">
        <option value="">Relevancia</option>
        <option value="asc">Precio: menor a mayor</option>
        <option value="desc">Precio: mayor a menor</option>
      </select>

      <label>
        <input type="checkbox" id="onlyOffers"> Solo ofertas 🔥
      </label>
    </section>

    <div id="resultsCount"></div>
    <div id="emptyState" class="hidden">No se encontraron productos.</div>
    <div id="productsGrid" class="products-grid">
        </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
