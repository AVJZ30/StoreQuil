<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda | StoreQuil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="padding-top: 72px;">

  <header class="navbar scrolled" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo"><img src="https://i.pinimg.com/736x/d5/f2/1c/d5f21cb479b6d9823b26dd65dfed628e.jpg" class="logo-img"><span class="logo-text">Store<span>Quil</span></span></a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="tienda.html" class="nav-link">Tienda</a>
      </nav>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </header>

  <section class="section" id="productos">
    <div class="container">
      <header class="section-head">
        <h2>Todos los productos</h2>
        <p>Lo más nuevo de nuestros emprendedores.</p>
      </header>

      <div class="filters">
        <div class="filter-group">
          <label>Categoría</label>
          <select id="filterCategory">
            <option value="">Todas</option>
            <option value="Comida">Comida</option>
            <option value="Ropa">Ropa</option>
            <option value="Belleza">Belleza</option>
            <option value="Tecnología">Tecnología</option>
            <option value="Hogar">Hogar</option>
            <option value="Mascotas">Mascotas</option>
            <option value="Regalos">Regalos</option>
            <option value="Servicios">Servicios</option>
            <option value="Educación">Educación</option>
            <option value="Automotriz">Automotriz</option>
            <option value="Videojuegos">Videojuegos</option>
            <option value="Otros">Otros</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Ordenar</label>
          <select id="sortPrice">
            <option value="">Relevancia</option>
            <option value="asc">Precio: menor a mayor</option>
            <option value="desc">Precio: mayor a menor</option>
          </select>
        </div>

        <label class="switch">
          <input type="checkbox" id="onlyOffers" />
          <span class="slider"></span>
          <span>Solo ofertas 🔥</span>
        </label>
        <div class="results-count" id="resultsCount"></div>
      </div>

      <div class="products-grid" id="productsGrid">
        <!-- Los productos aparecerán aquí -->
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
