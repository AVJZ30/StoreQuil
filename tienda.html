<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>Tienda | StoreQuil</title>
  <meta name="description" content="Explora todos los productos de los emprendedores ecuatorianos en StoreQuil" />
  <meta name="theme-color" content="#2563EB" />
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232563EB'/%3E%3Ctext x='50' y='68' font-family='system-ui,sans-serif' font-size='58' font-weight='800' text-anchor='middle' fill='white'%3ES%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="padding-top: 72px;">

  <!-- ========== NAVBAR ========== -->
  <header class="navbar scrolled" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo" aria-label="Volver al inicio">
        <img src="https://i.pinimg.com/736x/d0/e8/12/d0e81297ac5ae8c098012b0a178b1c3b.jpg" alt="StoreQuil Logo" class="logo-img" width="38" height="38">
        <span class="logo-text">Store<span>Quil</span></span>
      </a>
      
      <!-- 🔥 Menú de navegación -->
      <nav class="nav-links" id="navLinks" aria-label="Navegación principal">
        <a href="index.html" class="nav-link">
          <i class="fa-solid fa-house"></i> Inicio
        </a>
        <a href="tienda.html" class="nav-link" style="background: var(--primary-50); color: var(--primary);">
          <i class="fa-solid fa-store"></i> Tienda
        </a>
      </nav>
      
      <!-- Botón hamburguesa -->
      <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ========== TIENDA ========== -->
  <main>
    <section class="section" id="productos">
      <div class="container">
        <header class="section-head">
          <span class="pill" style="margin-bottom: 12px;">
            <i class="fa-solid fa-store"></i> Marketplace
          </span>
          <h2>Todos los productos</h2>
          <p>Lo más nuevo de nuestros emprendedores.</p>
        </header>

        <!-- Filtros -->
        <div class="filters">
          <div class="search-bar-tienda">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="searchInput" placeholder="Buscar por nombre o negocio..." aria-label="Buscar productos" />
          </div>

          <div class="filter-group">
            <label>Categoría</label>
            <select id="filterCategory" aria-label="Filtrar por categoría">
              <option value="">Todas</option>
              <option value="Comida">Comida</option>
              <option value="Ropa">Ropa</option>
              <option value="Belleza">Belleza</option>
              <option value="Tecnología">Tecnología</option>
              <option value="Hogar">Hogar</option>
              <option value="Mascotas">Mascotas</option>
              <option value="Regalos">Regalos</option>
              <option value="Servicios">Servicios</option>
              <option value="Educación">Educación</option>
              <option value="Automotriz">Automotriz</option>
              <option value="Videojuegos">Videojuegos</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Ordenar</label>
            <select id="sortPrice" aria-label="Ordenar por precio">
              <option value="">Relevancia</option>
              <option value="asc">Precio: menor a mayor</option>
              <option value="desc">Precio: mayor a menor</option>
            </select>
          </div>

          <label class="switch">
            <input type="checkbox" id="onlyOffers" />
            <span class="slider"></span>
            <span>Solo ofertas 🔥</span>
          </label>
          
          <div class="results-count" id="resultsCount"></div>
        </div>

        <!-- Grid de productos -->
        <div class="products-grid" id="productsGrid">
          <!-- Se llena dinámicamente -->
        </div>
      </div>
    </section>
  </main>

  <!-- Botón flotante volver arriba -->
  <button class="back-to-top" id="backToTop" aria-label="Volver arriba" title="Volver arriba">
    <i class="fa-solid fa-chevron-up"></i>
  </button>

  <!-- Footer simple -->
  <footer style="text-align: center; padding: 24px; background: var(--bg-muted); color: var(--text-soft); font-size: 0.9rem;">
    <div class="container">
      <p>&copy; 2026 StoreQuil — Hecho  en Ecuador</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
